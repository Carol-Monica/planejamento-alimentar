<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planejamento Alimentar</title>
  <meta name="theme-color" content="#4CAF50" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #4CAF50;
      --green-dark: #388E3C;
      --green-light: #E8F5E9;
      --gray: #F5F5F5;
      --gray-mid: #9E9E9E;
      --text: #212121;
      --text-light: #757575;
      --white: #fff;
      --radius: 12px;
      --shadow: 0 2px 8px rgba(0,0,0,0.10);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--gray);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 72px;
    }
    .header {
      background: var(--green);
      color: white;
      padding: 16px 20px 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: var(--shadow);
    }
    .header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.3px; }
    .header p  { font-size: 13px; opacity: .8; margin-top: 2px; }
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 64px;
      background: white;
      display: flex;
      border-top: 1px solid #E0E0E0;
      z-index: 20;
      box-shadow: 0 -2px 8px rgba(0,0,0,.08);
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--gray-mid);
      font-size: 11px;
      font-weight: 500;
      transition: color .2s;
    }
    .nav-btn.active { color: var(--green); }
    .nav-btn svg { width: 22px; height: 22px; }
    .page { display: none; padding: 16px; }
    .page.active { display: block; }
    .week-strip {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
      margin-bottom: 16px;
    }
    .week-strip::-webkit-scrollbar { display: none; }
    .day-chip {
      flex-shrink: 0;
      width: 48px;
      border-radius: 24px;
      border: none;
      padding: 8px 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      background: white;
      color: var(--text);
      font-size: 11px;
      box-shadow: var(--shadow);
      transition: all .15s;
    }
    .day-chip .num { font-size: 17px; font-weight: 700; line-height: 1; }
    .day-chip .dot { width: 6px; height: 6px; border-radius: 50%; background: transparent; }
    .day-chip.has-meals .dot { background: var(--green); }
    .day-chip.selected { background: var(--green); color: white; box-shadow: 0 3px 10px rgba(76,175,80,.4); }
    .day-chip.today:not(.selected) { border: 2px solid var(--green); }
    .section-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-light);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .meal-card {
      background: white;
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .meal-icon { font-size: 22px; flex-shrink: 0; margin-top: 2px; }
    .meal-body { flex: 1; }
    .meal-title { font-size: 12px; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
    .meal-text { font-size: 15px; color: var(--text); min-height: 22px; }
    .meal-empty { color: #BDBDBD; font-style: italic; }
    .edit-btn { background: none; border: none; cursor: pointer; color: var(--gray-mid); padding: 4px; border-radius: 6px; transition: color .2s; flex-shrink: 0; }
    .edit-btn:hover { color: var(--green); }
    .week-day-block { background: white; border-radius: var(--radius); margin-bottom: 12px; box-shadow: var(--shadow); overflow: hidden; }
    .week-day-header { background: var(--green); color: white; padding: 10px 16px; font-weight: 700; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
    .week-day-header.today-header { background: var(--green-dark); }
    .week-day-header .badge { font-size: 10px; background: rgba(255,255,255,.3); padding: 2px 8px; border-radius: 10px; font-weight: 500; }
    .week-meal-row { display: flex; align-items: center; padding: 10px 16px; border-bottom: 1px solid #F0F0F0; gap: 10px; }
    .week-meal-row:last-child { border-bottom: none; }
    .week-meal-label { font-size: 12px; font-weight: 600; color: var(--text-light); width: 80px; flex-shrink: 0; text-transform: uppercase; }
    .week-meal-value { font-size: 14px; flex: 1; color: var(--text); }
    .week-meal-empty { color: #BDBDBD; font-style: italic; }
    .week-edit-btn { background: none; border: none; cursor: pointer; color: var(--gray-mid); padding: 4px; border-radius: 6px; }
    .week-edit-btn:hover { color: var(--green); }
    .add-item-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .add-item-row input { flex: 1; padding: 12px 14px; border: 2px solid #E0E0E0; border-radius: var(--radius); font-size: 15px; outline: none; transition: border-color .2s; background: white; }
    .add-item-row input:focus { border-color: var(--green); }
    .add-item-row button { background: var(--green); color: white; border: none; border-radius: var(--radius); padding: 0 18px; font-size: 22px; cursor: pointer; box-shadow: 0 2px 6px rgba(76,175,80,.3); }
    .shop-list { list-style: none; }
    .shop-item { background: white; border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 12px; }
    .shop-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--green); background: white; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .15s; }
    .shop-check.checked { background: var(--green); border-color: var(--green); }
    .shop-check.checked::after { content: ''; width: 6px; height: 10px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); display: block; }
    .shop-text { flex: 1; font-size: 15px; transition: all .2s; }
    .shop-text.done { text-decoration: line-through; color: var(--text-light); }
    .shop-delete { background: none; border: none; cursor: pointer; color: #BDBDBD; padding: 4px; font-size: 18px; line-height: 1; border-radius: 6px; }
    .shop-delete:hover { color: #E53935; }
    .shop-summary { text-align: center; color: var(--text-light); font-size: 13px; margin-bottom: 12px; }
    .clear-done-btn { display: block; width: 100%; margin-top: 12px; padding: 10px; background: none; border: 1px solid #E0E0E0; border-radius: var(--radius); color: var(--text-light); font-size: 13px; cursor: pointer; }
    .clear-done-btn:hover { border-color: #E53935; color: #E53935; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: flex-end; z-index: 100; opacity: 0; pointer-events: none; transition: opacity .2s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: white; border-radius: 20px 20px 0 0; padding: 24px 20px 32px; width: 100%; transform: translateY(100%); transition: transform .25s cubic-bezier(.4,0,.2,1); }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal h2 { font-size: 16px; margin-bottom: 16px; }
    .modal textarea { width: 100%; padding: 12px 14px; border: 2px solid #E0E0E0; border-radius: var(--radius); font-size: 15px; font-family: inherit; outline: none; transition: border-color .2s; resize: none; }
    .modal textarea:focus { border-color: var(--green); }
    .modal-btns { display: flex; gap: 10px; margin-top: 16px; }
    .modal-cancel { flex: 1; padding: 12px; background: var(--gray); border: none; border-radius: var(--radius); font-size: 15px; cursor: pointer; }
    .modal-save { flex: 2; padding: 12px; background: var(--green); color: white; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-light); }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }
  </style>
</head>
<body>
<div class="header">
  <h1 id="headerTitle">🥗 Hoje</h1>
  <p id="headerSub"></p>
</div>
<div class="page active" id="page-hoje">
  <div class="week-strip" id="weekStrip"></div>
  <div class="section-label">Refeições</div>
  <div id="todayMeals"></div>
</div>
<div class="page" id="page-semana">
  <div id="weekBlocks"></div>
</div>
<div class="page" id="page-mercado">
  <div class="add-item-row">
    <input type="text" id="newItemInput" placeholder="Adicionar item…" />
    <button id="addItemBtn">+</button>
  </div>
  <p class="shop-summary" id="shopSummary"></p>
  <ul class="shop-list" id="shopList"></ul>
  <button class="clear-done-btn" id="clearDoneBtn">Remover itens comprados</button>
</div>
<nav class="bottom-nav">
  <button class="nav-btn active" data-page="hoje" onclick="navigate('hoje')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm1 14.93V17a1 1 0 0 1-2 0v-.07A8 8 0 0 1 4.07 11H4a1 1 0 0 1 0-2h.07A8 8 0 0 1 11 4.07V4a1 1 0 0 1 2 0v.07A8 8 0 0 1 19.93 11H20a1 1 0 0 1 0 2h-.07A8 8 0 0 1 13 16.93zM12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8zm0 6a2 2 0 1 1 0-4 2 2 0 0 1 0 4z"/></svg>
    Hoje
  </button>
  <button class="nav-btn" data-page="semana" onclick="navigate('semana')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-1V1h-2v2H8V1H6v2H5a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm0 18H5V8h14v13zM7 10h5v5H7z"/></svg>
    Semana
  </button>
  <button class="nav-btn" data-page="mercado" onclick="navigate('mercado')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.21 9l-4.38-6.56a.993.993 0 0 0-.83-.4c-.32 0-.64.14-.83.4L6.79 9H2c-.55 0-1 .45-1 1 0 .09.01.18.04.27l2.54 9.27c.23.84 1 1.46 1.92 1.46h13c.92 0 1.69-.62 1.93-1.46l2.54-9.27L23 10c0-.55-.45-1-1-1h-4.79zM12 4.8L14.8 9H9.2L12 4.8zM18.5 19l-13 .01L3.31 11H20.7L18.5 19zM12 13c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
    Mercado
  </button>
</nav>
<div class="modal-overlay" id="mealModal">
  <div class="modal">
    <h2 id="modalTitle">Editar refeição</h2>
    <textarea id="modalInput" rows="3" placeholder="O que vai no prato?"></textarea>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="modal-save" onclick="saveMeal()">Salvar</button>
    </div>
  </div>
</div>
<script>
const MEALS_KEY = 'cme_meals';
const SHOP_KEY  = 'cme_shopping';
function getMeals() { return JSON.parse(localStorage.getItem(MEALS_KEY) || '{}'); }
function saveMeals(data) { localStorage.setItem(MEALS_KEY, JSON.stringify(data)); }
function getShop() { return JSON.parse(localStorage.getItem(SHOP_KEY) || '[]'); }
function saveShop(data) { localStorage.setItem(SHOP_KEY, JSON.stringify(data)); }
const DAY_NAMES = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const DAY_FULL  = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
const MONTH_FULL = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
function dateKey(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function getWeekDays(baseDate) {
  const days=[]; const d=new Date(baseDate);
  d.setDate(d.getDate()-d.getDay());
  for(let i=0;i<7;i++){days.push(new Date(d));d.setDate(d.getDate()+1);}
  return days;
}
const today=new Date(); today.setHours(0,0,0,0);
let selectedDate=new Date(today);
function navigate(page) {
  const pages={hoje:'page-hoje',semana:'page-semana',mercado:'page-mercado'};
  const titles={hoje:'🥗 Hoje',semana:'📅 Semana',mercado:'🛒 Lista de Mercado'};
  Object.keys(pages).forEach(k=>{document.getElementById(pages[k]).classList.toggle('active',k===page);});
  document.querySelectorAll('.nav-btn').forEach(b=>{b.classList.toggle('active',b.dataset.page===page);});
  document.getElementById('headerTitle').textContent=titles[page];
  if(page==='hoje'){updateHeaderSub();renderToday();}
  else if(page==='semana'){document.getElementById('headerSub').textContent='';renderWeek();}
  else{document.getElementById('headerSub').textContent='';renderShop();}
}
function updateHeaderSub() {
  const d=selectedDate;
  document.getElementById('headerSub').textContent=DAY_FULL[d.getDay()]+', '+d.getDate()+' de '+MONTH_FULL[d.getMonth()];
}
function renderWeekStrip() {
  const strip=document.getElementById('weekStrip');
  const meals=getMeals(); const days=getWeekDays(today);
  strip.innerHTML='';
  days.forEach(d=>{
    const key=dateKey(d);
    const isToday=key===dateKey(today);
    const isSelected=key===dateKey(selectedDate);
    const hasMeals=meals[key]&&Object.values(meals[key]).some(v=>v);
    const btn=document.createElement('button');
    btn.className='day-chip'+(isSelected?' selected':'')+(isToday&&!isSelected?' today':'')+(hasMeals?' has-meals':'');
    btn.innerHTML='<span style="font-size:10px">'+DAY_NAMES[d.getDay()]+'</span><span class="num">'+d.getDate()+'</span><span class="dot"></span>';
    btn.onclick=()=>{selectedDate=new Date(d);renderWeekStrip();renderTodayMeals();updateHeaderSub();};
    strip.appendChild(btn);
  });
}
const MEAL_TYPES=[
  {key:'breakfast',label:'Café da Manhã',icon:'☀️'},
  {key:'lunch',label:'Almoço',icon:'🍽️'},
  {key:'dinner',label:'Jantar',icon:'🌙'},
];
function renderTodayMeals() {
  const meals=getMeals(); const key=dateKey(selectedDate);
  const dayMeals=meals[key]||{}; const container=document.getElementById('todayMeals');
  container.innerHTML='';
  MEAL_TYPES.forEach(m=>{
    const val=dayMeals[m.key]||'';
    const card=document.createElement('div');
    card.className='meal-card';
    card.innerHTML='<div class="meal-icon">'+m.icon+'</div><div class="meal-body"><div class="meal-title">'+m.label+'</div><div class="meal-text '+(val?'':'meal-empty')+'">'+(val||'Não planejado')+'</div></div><button class="edit-btn" onclick="openModal(''+key+'',''+m.key+'',''+m.label+'')"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg></button>';
    container.appendChild(card);
  });
}
function renderToday(){renderWeekStrip();renderTodayMeals();}
function renderWeek() {
  const meals=getMeals(); const days=getWeekDays(today);
  const container=document.getElementById('weekBlocks');
  container.innerHTML='';
  days.forEach(d=>{
    const key=dateKey(d); const isToday=key===dateKey(today);
    const dayMeals=meals[key]||{};
    const block=document.createElement('div');
    block.className='week-day-block';
    let html='<div class="week-day-header'+(isToday?' today-header':'')+'">'+DAY_FULL[d.getDay()]+', '+d.getDate()+'/'+(d.getMonth()+1)+(isToday?'<span class="badge">Hoje</span>':'')+'</div>';
    MEAL_TYPES.forEach(m=>{
      const val=dayMeals[m.key]||'';
      html+='<div class="week-meal-row"><span class="week-meal-label">'+m.icon+' '+m.label.split(' ')[0]+'</span><span class="week-meal-value '+(val?'':'week-meal-empty')+'">'+(val||'Vazio')+'</span><button class="week-edit-btn" onclick="openModal(''+key+'',''+m.key+'',''+m.label+'')"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg></button></div>';
    });
    block.innerHTML=html;
    container.appendChild(block);
  });
}
let modalCtx={};
function openModal(dk,mealKey,mealLabel) {
  const meals=getMeals(); const val=(meals[dk]||{})[mealKey]||'';
  modalCtx={dateKey:dk,mealKey};
  document.getElementById('modalTitle').textContent='✏️ '+mealLabel;
  document.getElementById('modalInput').value=val;
  document.getElementById('mealModal').classList.add('open');
  setTimeout(()=>document.getElementById('modalInput').focus(),300);
}
function closeModal(){document.getElementById('mealModal').classList.remove('open');}
function saveMeal() {
  const val=document.getElementById('modalInput').value.trim();
  const meals=getMeals();
  if(!meals[modalCtx.dateKey])meals[modalCtx.dateKey]={};
  meals[modalCtx.dateKey][modalCtx.mealKey]=val;
  saveMeals(meals); closeModal();
  const activePage=document.querySelector('.page.active').id;
  if(activePage==='page-hoje')renderToday();
  if(activePage==='page-semana')renderWeek();
}
document.getElementById('mealModal').addEventListener('click',e=>{if(e.target===document.getElementById('mealModal'))closeModal();});
function renderShop() {
  const items=getShop(); const done=items.filter(i=>i.checked).length;
  document.getElementById('shopSummary').textContent=items.length===0?'Lista vazia':done+' de '+items.length+' itens comprados';
  const list=document.getElementById('shopList');
  list.innerHTML='';
  if(items.length===0){list.innerHTML='<div class="empty-state"><div class="icon">🛒</div><p>Adicione itens à lista acima</p></div>';return;}
  items.forEach((item,idx)=>{
    const li=document.createElement('li');
    li.className='shop-item';
    li.innerHTML='<div class="shop-check '+(item.checked?'checked':'')+'" onclick="toggleShop('+idx+')"></div><span class="shop-text '+(item.checked?'done':'')+'">'+(item.text)+'</span><button class="shop-delete" onclick="deleteShop('+idx+')">×</button>';
    list.appendChild(li);
  });
}
function addShopItem() {
  const input=document.getElementById('newItemInput');
  const text=input.value.trim(); if(!text)return;
  const items=getShop(); items.push({text,checked:false});
  saveShop(items); input.value=''; renderShop();
}
function toggleShop(idx){const items=getShop();items[idx].checked=!items[idx].checked;saveShop(items);renderShop();}
function deleteShop(idx){const items=getShop();items.splice(idx,1);saveShop(items);renderShop();}
document.getElementById('addItemBtn').onclick=addShopItem;
document.getElementById('newItemInput').addEventListener('keydown',e=>{if(e.key==='Enter')addShopItem();});
document.getElementById('clearDoneBtn').onclick=()=>{saveShop(getShop().filter(i=>!i.checked));renderShop();};
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
navigate('hoje');
</script>
</body>
    </html>
