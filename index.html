textarea{resize:none;}
button{cursor:pointer;}

@keyframes cmeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
@keyframes cmePop{from{transform:translateY(24px);}to{transform:none;}}

.modal-anim{animation:cmePop .3s cubic-bezier(.22,1,.36,1);}

<body>
<div id="root" style="display:flex;justify-content:center;min-height:100%;background:#F6E9E0;"></div>
<script>
// ─── Utilidades ──────────────────────────────────────────────────────────────
const iso = d => { const z=n=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate()); };
const parseISO = s => { const p=String(s).split('-').map(Number); return new Date(p[0],p[1]-1,p[2]); };
const addDays = (d,n) => { const x=new Date(d); x.setDate(x.getDate()+n); return x; };
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const DOW=['DOM','SEG','TER','QUA','QUI','SEX','SÁB'];
const MON_S=['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
const MON_F=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

// ─── Dados & persistência ─────────────────────────────────────────────────────
const STORAGE_KEY = 'cme_pa_v1';
function defaultData(){
  return {
    goal:2000,
    recipes:[],
    recipeCategories:[], // [{id,name}] categorias personalizadas
    meals:{},
    water:{},
    shopping:{frutas:[],legumes:[],padaria:[],proteinas:[],mercearia:[],limpeza:[],higiene:[],laticinios:[]},
    cleaning:{
      weekTasks:{seg:[],ter:[],qua:[],qui:[],sex:[],sab:[],dom:[]},
      dailyTasks:[],
      notes:'',
      periodicTasks:[] // [{id,text,freq:'semestral'|'anual',lastDone:null}]
    }
  };
}
function loadData(){
  try{const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){const d=JSON.parse(raw);const base=defaultData();
      const dc=d.cleaning||{};
      const cleaning={
        weekTasks:Object.assign({},base.cleaning.weekTasks,dc.weekTasks||{}),
        dailyTasks:dc.dailyTasks||[],
        notes:dc.notes||'',
        periodicTasks:dc.periodicTasks||[]
      };
      return Object.assign(base,d,{shopping:Object.assign(base.shopping,d.shopping||{}),cleaning,recipeCategories:d.recipeCategories||[]});}}catch(e){}
  return defaultData();
}
function saveData(d){ try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch(e){} }

// ─── Estado da UI ─────────────────────────────────────────────────────────────
let state = {
  view: 'hoje',
  selDate: iso(new Date()),
  data: loadData(),
  editId: null,
  search: '',
  waterAmt: '',
  addCat: null, addCatName:'', addCatQty:'',
  addBlock: null, addBlockName:'', addBlockRecipeId:'', addBlockCal:'',
  mealModal: false, mealDate: null, mealName:'', mealType:'cafe', mealRecipeId:'',
  recipeCatFilter: 'all',
  cleanSection: 'semana',
  cleanAddDay: null, cleanAddText: '',
  addingPeriodic: false, periodicText: '', periodicFreq: 'semestral',
  addingNewCat: false, newCatName: '',
};

function setState(patch){
  Object.assign(state, patch);
  render();
}
function updateData(fn){
  const d = JSON.parse(JSON.stringify(state.data));
  fn(d);
  saveData(d);
  setState({data:d});
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function recipeCal(id){
  const r=state.data.recipes.find(x=>x.id===id);
  const c=r?parseInt(r.calories,10):0;
  return c>0?c:0;
}
function itemCal(m){
  if(m.cal>0) return m.cal;
  if(m.recipeId) return recipeCal(m.recipeId);
  return 0;
}

// ─── HOJE ────────────────────────────────────────────────────────────────────
function renderHoje(){
  const D=state.data, S=state;
  const todayISO=iso(new Date());
  const sel=parseISO(S.selDate);
  const off=(sel.getDay()+6)%7;
  const wkStart=addDays(sel,-off);
  const monthLabel=MON_F[wkStart.getMonth()]+' '+wkStart.getFullYear();
  const selDayLabel=DOW[sel.getDay()]+', '+sel.getDate()+' '+MON_S[sel.getMonth()];

  let weekStrip='';
  for(let i=0;i<7;i++){
    const d=addDays(wkStart,i), di=iso(d);
    const isSel=di===S.selDate, isToday=di===todayISO;
    const has=(D.meals[di]||[]).length>0;
    const numBg=isSel?ACCENT:(isToday?ACCENT_SOFT:'transparent');
    const numCol=isSel?ACCENT_INK:(isToday?ACCENT_TEXT:'#1A1A2E');
    const dotCol=has?(isSel?ACCENT_INK:ACCENT_TEXT):'transparent';
    weekStrip+=`<button data-action="selDate" data-date="${di}" style="border:none;background:transparent;display:flex;flex-direction:column;align-items:center;gap:7px;padding:4px 0;">
      <span style="font-size:10px;letter-spacing:.06em;color:#9A9AB5;font-weight:600;">${DOW[d.getDay()]}</span>
      <span style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:15px;background:${numBg};color:${numCol};transition:background .2s,color .2s;">${d.getDate()}</span>
      <span style="width:5px;height:5px;border-radius:50%;background:${dotCol};"></span>
    </button>`;
  }

  const dmArr=D.meals[S.selDate]||[];
  let dayCal=0;
  let blocksHTML='';
  for(const type of ['cafe','almoco','lanche','jantar']){
    const ti=TYPE_INFO[type];
    const items=dmArr.filter(m=>m.type===type);
    const adding=S.addBlock===type;
    const blockCal=items.reduce((a,m)=>a+itemCal(m),0);
    dayCal+=blockCal;

    let itemsHTML='';
    if(items.length===0) itemsHTML=`<div style="font-size:14px;color:#BBB6C4;padding:2px 2px 4px;">Nada por aqui ainda.</div>`;
    else items.forEach((m,idx)=>{
      const c=itemCal(m);
      const calStr=c>0?c+' kcal':'';
      const upCol=idx>0?'#9A9AB5':'#E3DFE7';
      const downCol=idx<items.length-1?'#9A9AB5':'#E3DFE7';
      itemsHTML+=`<div style="display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:14px;background:rgba(255,255,255,.65);">
        <span style="width:8px;height:8px;border-radius:50%;background:${ti.color};flex:none;"></span>
        <span style="flex:1;min-width:0;font-size:15px;font-weight:500;color:#1A1A2E;">${esc(m.name)}</span>
        <span style="font-size:12px;font-weight:600;color:#9A9AB5;flex:none;">${calStr}</span>
        <div style="display:flex;flex-direction:column;gap:1px;flex:none;">
          <button data-action="mealUp" data-date="${S.selDate}" data-id="${m.id}" data-type="${type}" style="border:none;background:transparent;color:${upCol};padding:0 3px;line-height:0;">${IC.up}</button>
          <button data-action="mealDown" data-date="${S.selDate}" data-id="${m.id}" data-type="${type}" style="border:none;background:transparent;color:${downCol};padding:0 3px;line-height:0;">${IC.down}</button>
        </div>
        <button data-action="mealDel" data-date="${S.selDate}" data-id="${m.id}" style="border:none;background:transparent;color:#C9C4D2;padding:4px;flex:none;">${IC.x}</button>
      </div>`;
    });

    let addFormHTML='';
    if(adding){
      const recs=D.recipes.filter(r=>(r.name||'').trim());
      let recChips='';
      if(recs.length){
        recChips='<div style="display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;">';
        recs.forEach(r=>{
          const act=S.addBlockRecipeId===r.id;
          recChips+=`<button data-action="blockRecipe" data-rid="${r.id}" data-rname="${esc(r.name)}" data-rcal="${recipeCal(r.id)}" style="border:none;background:${act?ACCENT:'#F1EEE8'};color:${act?ACCENT_INK:'#404068'};font-weight:600;font-size:13px;padding:8px 13px;border-radius:999px;">${esc(r.name)}</button>`;
        });
        recChips+='</div>';
      }
      addFormHTML=`<div style="margin-top:10px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <input data-field="addBlockName" value="${esc(S.addBlockName)}" placeholder="Alimento ou receita" style="flex:1;min-width:0;border:1px solid #E2DACE;border-radius:11px;padding:11px 13px;font-size:14.5px;background:#fff;outline:none;color:#1A1A2E;"/>
          <input data-field="addBlockCal" value="${esc(S.addBlockCal)}" inputmode="numeric" placeholder="kcal" style="width:64px;border:1px solid #E2DACE;border-radius:11px;padding:11px 8px;font-size:14px;background:#fff;outline:none;color:#5C5C88;text-align:center;flex:none;"/>
          <button data-action="addBlockSubmit" data-type="${type}" data-date="${S.selDate}" style="border:none;background:${ti.color};color:#fff;width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex:none;">${IC.plus}</button>
          <button data-action="addBlockCancel" style="border:none;background:transparent;color:#9A9AB5;padding:4px;flex:none;">${IC.x}</button>
        </div>
        ${recChips}
      </div>`;
    }

    blocksHTML+=`<div style="background:${ti.tint};border:1px solid rgba(255,255,255,.7);border-radius:24px;padding:16px 16px 14px;box-shadow:0 10px 24px -12px rgba(192,69,58,.18);">
      <div style="display:flex;align-items:center;gap:11px;margin-bottom:12px;">
        <div style="width:40px;height:40px;border-radius:13px;background:${ti.grad};display:flex;align-items:center;justify-content:center;color:#fff;flex:none;box-shadow:0 6px 14px -4px rgba(192,69,58,.35);">${IC.foodico}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-family:'Playfair Display',serif;font-weight:700;font-size:18px;line-height:1.1;color:#1A1A2E;">${ti.label}</div>
          <div style="font-size:12px;font-weight:600;color:${ti.color};margin-top:3px;">${blockCal>0?blockCal+' kcal':''}</div>
        </div>

// ─── SEMANA ──────────────────────────────────────────────────────────────────
function renderSemana(){
  const D=state.data, S=state;
  const todayISO=iso(new Date());
  const sel=parseISO(S.selDate);

  const wkStart=addDays(sel,-off);
  const monthLabel=MON_F[wkStart.getMonth()]+' '+wkStart.getFullYear();

  let cardsHTML='';
  for(let i=0;i<7;i++){
    const d=addDays(wkStart,i), di=iso(d);

    let mealsHTML='';
    if(meals.length===0) mealsHTML=`<div style="font-size:13px;color:#BBB6C4;padding:2px 0;">Sem refeições</div>`;
    else meals.forEach(m=>{

      mealsHTML+=`<div style="display:flex;align-items:center;gap:9px;">
        <span style="width:7px;height:7px;border-radius:50%;background:${ti.color};flex:none;"></span>
        <span style="font-size:14px;font-weight:500;flex:1;min-width:0;">${esc(m.name)}</span>
        <span style="font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 8px;border-radius:999px;background:${ti.bg};color:${ti.color};">${ti.label}</span>

    });
    cardsHTML+=`<div style="background:#fff;border:1px solid rgba(26,26,46,.07);border-radius:16px;padding:14px 15px;box-shadow:0 1px 2px rgba(26,26,46,.04);">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div style="display:flex;align-items:baseline;gap:8px;">
          <span style="font-weight:700;font-size:12px;letter-spacing:.1em;color:${ACCENT_TEXT};">${DOW[d.getDay()]}</span>
          <span style="font-size:12px;color:#9A9AB5;font-weight:600;">${d.getDate()} ${MON_S[d.getMonth()]}</span>
          ${isToday?`<span style="font-size:10px;background:${ACCENT_SOFT};color:${ACCENT_TEXT};font-weight:700;padding:2px 7px;border-radius:999px;">Hoje</span>`:''}
        </div>
        <button data-action="openMealModal" data-date="${di}" style="border:none;background:${ACCENT_SOFT};color:${ACCENT_TEXT};width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>

      <h1 style="font-family:'Playfair Display',serif;font-weight:800;font-size:32px;letter-spacing:-.01em;">Semana</h1>
      <div style="display:flex;align-items:center;gap:6px;">
        <button data-action="prevWeek" style="width:32px;height:32px;border-radius:50%;border:none;background:#F1EBE2;color:#5C5C88;display:flex;align-items:center;justify-content:center;">${IC.chevL}</button>
        <button data-action="nextWeek" style="width:32px;height:32px;border-radius:50%;border:none;background:#F1EBE2;color:#5C5C88;display:flex;align-items:center;justify-content:center;">${IC.chevR}</button>
      </div>

    <div style="font-family:'Playfair Display',serif;font-weight:600;font-size:16px;color:#5C5C88;margin-bottom:16px;">${monthLabel}</div>
    <div style="display:flex;flex-direction:column;gap:12px;">${cardsHTML}</div>
  </div>`;

// ─── ÁGUA ────────────────────────────────────────────────────────────────────
function renderAgua(){
  const D=state.data, S=state;
  const todayISO=iso(new Date());
  const wlog=D.water[todayISO]||[];
  const wcur=wlog.reduce((a,b)=>a+(b.ml||0),0);
  const goal=D.goal||2000;
  const pct=Math.min(100,wcur/goal*100);
  const rem=Math.max(0,goal-wcur);
  const ringCirc=2*Math.PI*110;
  const ringOffset=(ringCirc*(1-pct/100)).toFixed(1);

  let weekScoresHTML='';
  for(let i=6;i>=0;i--){
    const d=addDays(new Date(),-i), di=iso(d);
    const sum=(D.water[di]||[]).reduce((a,b)=>a+(b.ml||0),0);
    const p=goal?Math.round(sum/goal*100):0;
    const isToday=di===todayISO;
    let bg,col,ring;
    if(sum===0){bg='#F1ECE6';col='#C2BBB2';ring='transparent';}
    else if(p>=100){bg='#2D7A57';col='#fff';ring='#A7D9C2';}
    else if(p>=60){bg='#E6AE36';col='#fff';ring='#F6DD9C';}
    else if(p>=30){bg='#F2894E';col='#fff';ring='#FBC79F';}
    else{bg='#E2607A';col='#fff';ring='#F4B6C4';}
    weekScoresHTML+=`<div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <span style="font-size:9.5px;letter-spacing:.04em;color:#9A9AB5;font-weight:700;">${DOW[d.getDay()]}</span>
      <div style="width:34px;height:34px;border-radius:50%;background:${bg};color:${col};border:2px solid ${ring};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;">${sum===0?'':String(Math.min(p,999))}</div>
      <span style="width:5px;height:5px;border-radius:50%;background:${isToday?ACCENT:'transparent'};"></span>
    </div>`;
  }

  const quickBtns=[
    {ml:150,svg:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h12l-1.2 14.2a2 2 0 0 1-2 1.8H9.2a2 2 0 0 1-2-1.8Z"/><path d="M6.7 10.5h10.6"/></svg>`},
    {ml:250,svg:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M7.5 3h9l-1 17.2a1 1 0 0 1-1 .8h-4a1 1 0 0 1-1-.8Z"/><path d="M7 9h10"/></svg>`},
    {ml:350,svg:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12c0 4.4-2.7 8-6 8S6 7.4 6 3Z"/><path d="M12 11v7"/><path d="M8 21h8"/></svg>`},
    {ml:500,svg:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2h4v2.5l1.4 2.3a4 4 0 0 1 .6 2.1V20a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2V8.9a4 4 0 0 1 .6-2.1L10 4.5Z"/><path d="M8 12h8"/></svg>`},
  ];
  let quickHTML='';
  quickBtns.forEach(q=>{
    quickHTML+=`<button data-action="quickWater" data-ml="${q.ml}" style="border:1px solid #DCEAF4;background:#F4FAFD;color:#3E92C9;display:flex;flex-direction:column;align-items:center;gap:6px;padding:13px 0 11px;border-radius:15px;">${q.svg}<span style="font-weight:700;font-size:13.5px;">+${q.ml}</span></button>`;
  });

  let logHTML='';
  if(wlog.length===0) logHTML=`<div style="text-align:center;font-size:14px;color:#BBB6C4;padding:18px 0;">Nenhum registro ainda hoje.</div>`;
  else [...wlog].reverse().forEach(e=>{
    logHTML+=`<div style="display:flex;align-items:center;gap:12px;background:#fff;border:1px solid rgba(26,26,46,.06);border-radius:13px;padding:11px 13px;">
      <div style="width:30px;height:30px;border-radius:9px;background:#EDF6FC;display:flex;align-items:center;justify-content:center;color:#4BA4DC;flex:none;">${IC.drop}</div>
      <span style="font-weight:600;font-size:15px;flex:1;">${e.ml} ml</span>
      <span style="font-size:13px;color:#9A9AB5;">${e.time}</span>
      <button data-action="waterDel" data-id="${e.id}" style="border:none;background:transparent;color:#C4C0CE;padding:4px;">${IC.x}</button>
    </div>`;
  });

  return `<div class="page-anim" style="padding:6px 22px 24px;">
    <h1 style="font-family:'Playfair Display',serif;font-weight:800;font-size:32px;margin:10px 0 18px;letter-spacing:-.01em;">Água</h1>
    <div style="display:flex;flex-direction:column;align-items:center;background:#fff;border:1px solid rgba(26,26,46,.06);border-radius:24px;padding:24px 18px 20px;box-shadow:0 10px 26px -14px rgba(75,164,220,.35);margin-bottom:18px;">
      <div style="position:relative;width:236px;height:236px;display:flex;align-items:center;justify-content:center;">
        <svg width="236" height="236" viewBox="0 0 240 240" style="position:absolute;inset:0;">
          <circle cx="120" cy="120" r="110" fill="none" stroke="#E9F3F9" stroke-width="11"></circle>
          <circle cx="120" cy="120" r="110" fill="none" stroke="${ACCENT}" stroke-width="11" stroke-linecap="round" stroke-dasharray="${ringCirc.toFixed(1)}" stroke-dashoffset="${ringOffset}" transform="rotate(-90 120 120)" style="transition:stroke-dashoffset .55s cubic-bezier(.22,1,.36,1);"></circle>
        </svg>
        ${bottleSVG(pct)}
        <div style="position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);background:${ACCENT_GRAD};color:#fff;font-weight:800;font-size:14px;letter-spacing:.02em;padding:5px 15px;border-radius:999px;box-shadow:0 6px 14px -4px rgba(244,123,91,.55);">${Math.round(pct)}%</div>
      </div>
      <div style="display:flex;align-items:baseline;gap:6px;margin-top:22px;">
        <span style="font-family:'Playfair Display',serif;font-weight:800;font-size:42px;line-height:1;color:#3E92C9;">${wcur}</span>
        <span style="font-size:15px;color:#9A9AB5;font-weight:600;">/ ${goal} ml</span>
      </div>
      <div style="font-size:13px;color:#5C5C88;margin-top:6px;">${rem>0?rem+' ml para a meta':'Meta do dia atingida!'}</div>
      <div style="width:100%;height:1px;background:#F0EAE2;margin:18px 0 14px;"></div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#9A9AB5;font-weight:700;">Meta diária</span>
        <button data-action="goalDec" style="width:30px;height:30px;border-radius:9px;border:1px solid #E2DACE;background:#fff;color:#5C5C88;font-size:18px;display:flex;align-items:center;justify-content:center;line-height:1;">−</button>
        <span style="font-weight:700;font-size:15px;min-width:64px;text-align:center;">${goal} ml</span>
        <button data-action="goalInc" style="width:30px;height:30px;border-radius:9px;border:1px solid #E2DACE;background:#fff;color:#5C5C88;font-size:18px;display:flex;align-items:center;justify-content:center;line-height:1;">+</button>
      </div>
    </div>
    <div style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#9A9AB5;font-weight:700;margin-bottom:11px;">Últimos 7 dias</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;background:#fff;border:1px solid rgba(26,26,46,.06);border-radius:18px;padding:14px 8px;margin-bottom:20px;box-shadow:0 1px 3px rgba(26,26,46,.04);">${weekScoresHTML}</div>
    <div style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#9A9AB5;font-weight:700;margin-bottom:11px;">Adicionar rápido</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:14px;">${quickHTML}</div>
    <div style="display:flex;gap:9px;margin-bottom:24px;">
      <input data-field="waterAmt" value="${esc(S.waterAmt)}" inputmode="numeric" placeholder="Outro valor (ml)" style="flex:1;border:1px solid #E2DACE;border-radius:13px;padding:12px 14px;font-size:14px;background:#fff;outline:none;color:#1A1A2E;"/>
      <button data-action="waterAdd" style="border:none;background:${ACCENT_GRAD};color:#fff;font-weight:600;font-size:13px;letter-spacing:.06em;text-transform:uppercase;padding:0 18px;border-radius:13px;box-shadow:0 8px 18px -6px rgba(244,123,91,.5);">Add</button>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;">
      <span style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#9A9AB5;font-weight:700;">Registro de hoje</span>
      <button data-action="waterReset" style="border:none;background:transparent;color:#C7708A;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;">Zerar</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;">${logHTML}</div>
  </div>`;
}

// ─── RECEITAS (lista) ─────────────────────────────────────────────────────────
function renderReceitas(){
  const D=state.data, S=state;
  const q=(S.search||'').toLowerCase();
  const allCats=[{id:'all',label:'Todas'},...RECIPE_CATS_FIXED,...(D.recipeCategories||[]).map(c=>({id:c.id,label:c.name}))];
  const activeCat=S.recipeCatFilter||'all';

  let filtered=D.recipes.filter(r=>!q||(r.name||'').toLowerCase().includes(q));
  if(activeCat!=='all') filtered=filtered.filter(r=>(r.category||'')=== activeCat);

  // Category tabs
  let tabsHTML='';
  allCats.forEach(c=>{
    const act=c.id===activeCat;
    tabsHTML+=`<button data-action="recipeCatFilter" data-cat="${c.id}" style="border:none;white-space:nowrap;background:${act?ACCENT:'#F1EBE2'};color:${act?'#fff':'#5C5C88'};font-weight:700;font-size:12px;letter-spacing:.04em;text-transform:uppercase;padding:8px 14px;border-radius:999px;flex:none;">${esc(c.label)}</button>`;
  });
  // Add new category button
  if(!S.addingNewCat){
    tabsHTML+=`<button data-action="openNewCat" style="border:1px dashed #D8CEBF;background:#fff;color:${ACCENT_TEXT};font-weight:600;font-size:12px;padding:8px 14px;border-radius:999px;flex:none;display:flex;align-items:center;gap:4px;">${IC.plus}Novo grupo</button>`;
  }

  let newCatFormHTML='';
  if(S.addingNewCat){
    newCatFormHTML=`<div style="display:flex;gap:8px;margin-bottom:12px;">
      <input data-field="newCatName" value="${esc(S.newCatName)}" placeholder="Nome do grupo" style="flex:1;border:1px solid #E2DACE;border-radius:11px;padding:10px 13px;font-size:14px;background:#fff;outline:none;color:#1A1A2E;"/>
      <button data-action="saveNewCat" style="border:none;background:${ACCENT_GRAD};color:#fff;font-weight:700;font-size:13px;padding:10px 16px;border-radius:11px;">Criar</button>
      <button data-action="cancelNewCat" style="border:none;background:transparent;color:#9A9AB5;padding:8px;">${IC.x}</button>
    </div>`;
  }

  let listHTML='';
  if(filtered.length===0){
    listHTML=`<div style="text-align:center;padding:48px 20px;background:#fff;border:1px dashed #E2D9CC;border-radius:18px;">
      <div style="width:54px;height:54px;border-radius:15px;background:${ACCENT_SOFT};display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:${ACCENT_TEXT};">${IC.book}</div>
      <div style="font-size:15px;color:#5C5C88;line-height:1.4;">Nenhuma receita aqui ainda.<br>Toque em <b style="color:${ACCENT_TEXT};">Nova</b> para começar.</div>
    </div>`;
  } else {
    filtered.forEach(r=>{
      const name=(r.name||'').trim()||'Sem nome';
      const catLabel=allCats.find(c=>c.id===(r.category||''))?.label||'';
      const calStr=(r.calories||'—')+' kcal';
      const ingCount=(r.ingredients||[]).filter(i=>(i.name||'').trim()).length;
      const costStr=r.cost?'R$ '+(r.cost):'';
      const servStr=r.servings?(r.servings)+' porç.':'';
      const meta=[calStr,ingCount+' itens',costStr,servStr].filter(Boolean).join(' · ');
      listHTML+=`<div style="display:flex;align-items:center;gap:13px;background:#fff;border:1px solid rgba(26,26,46,.07);border-radius:16px;padding:12px;box-shadow:0 1px 2px rgba(26,26,46,.05);">
        <button data-action="openRecipe" data-id="${r.id}" style="display:flex;align-items:center;gap:13px;flex:1;min-width:0;border:none;background:transparent;text-align:left;padding:0;">
          <div style="width:50px;height:50px;border-radius:13px;background:${ACCENT_SOFT};display:flex;align-items:center;justify-content:center;color:${ACCENT_TEXT};flex:none;">${IC.book}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-family:'Playfair Display',serif;font-weight:700;font-size:17px;line-height:1.2;">${esc(name)}</div>
            <div style="font-size:12.5px;color:#9A9AB5;margin-top:4px;">${meta}</div>
            ${catLabel?`<div style="display:inline-flex;align-items:center;gap:4px;background:${ACCENT_SOFT};color:${ACCENT_TEXT};font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;margin-top:5px;">${IC.tag}${esc(catLabel)}</div>`:''}
          </div>
        </button>
        <button data-action="deleteRecipe" data-id="${r.id}" style="border:none;background:transparent;color:#C4C0CE;padding:8px;flex:none;">${IC.trash}</button>
      </div>`;
    });
  }

  return `<div class="page-anim" style="padding:6px 22px 24px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin:10px 0 14px;">
      <h1 style="font-family:'Playfair Display',serif;font-weight:800;font-size:32px;letter-spacing:-.01em;">Receitas</h1>
      <button data-action="newRecipe" style="border:none;background:${ACCENT_GRAD};color:#fff;font-weight:600;font-size:12.5px;letter-spacing:.07em;text-transform:uppercase;padding:10px 16px;border-radius:999px;box-shadow:0 8px 18px -6px rgba(244,123,91,.5);display:flex;align-items:center;gap:6px;">${IC.plus}Nova</button>
    </div>
    <div style="display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #E2DACE;border-radius:14px;padding:11px 14px;margin-bottom:12px;">${IC.search}<input data-field="search" value="${esc(S.search)}" placeholder="Buscar receita" style="border:none;outline:none;flex:1;font-size:15px;background:transparent;color:#1A1A2E;"/></div>
    <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:10px;-webkit-overflow-scrolling:touch;">${tabsHTML}</div>
    ${newCatFormHTML}
    <div style="display:flex;flex-direction:column;gap:11px;">${listHTML}</div>
  </div>`;
}

// ─── RECEITA (detalhe) ────────────────────────────────────────────────────────
function renderReceita(){
  const D=state.data, S=state;
  const cur=D.recipes.find(r=>r.id===S.editId);
  if(!cur) return renderReceitas();
  const ings=cur.ingredients||[], steps=cur.steps||[];

  let ingsHTML='';
  ings.forEach(ing=>{
    ingsHTML+=`<div style="display:flex;align-items:center;gap:8px;">
      <input data-action="ingName" data-id="${ing.id}" value="${esc(ing.name||'')}" placeholder="Ingrediente" style="flex:1;border:1px solid #E2DACE;border-radius:11px;padding:11px 13px;font-size:14.5px;background:#fff;outline:none;color:#1A1A2E;"/>
      <input data-action="ingQty" data-id="${ing.id}" value="${esc(ing.qty||'')}" placeholder="Qtd" style="width:78px;border:1px solid #E2DACE;border-radius:11px;padding:11px 12px;font-size:14px;background:#fff;outline:none;color:#5C5C88;text-align:center;"/>
      <button data-action="ingDel" data-id="${ing.id}" style="border:none;background:transparent;color:#C4C0CE;padding:6px;flex:none;">${IC.x}</button>
    </div>`;
  });

  let stepsHTML='';
  steps.forEach((st,idx)=>{

      <button data-action="backRecipes" style="border:none;background:#F1EBE2;color:#5C5C88;display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:9px 14px 9px 11px;border-radius:999px;">${IC.chevL}Receitas</button>
      <button data-action="deleteCurrentRecipe" style="border:none;background:transparent;color:#C7708A;display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:8px;">${IC.trash}Excluir</button>

    <div style="display:flex;gap:7px;overflow-x:auto;padding-bottom:12px;margin-bottom:16px;-webkit-overflow-scrolling:touch;">${catPillsHTML}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;">
      <div style="display:flex;align-items:center;gap:10px;background:#fff;border:1px solid rgba(26,26,46,.07);border-radius:14px;padding:12px 14px;box-shadow:0 1px 2px rgba(26,26,46,.04);">
        <div style="width:34px;height:34px;border-radius:10px;background:${ACCENT_SOFT};display:flex;align-items:center;justify-content:center;color:${ACCENT_TEXT};flex:none;">${IC.bulb}</div>
        <div style="flex:1;">
          <div style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#9A9AB5;font-weight:700;margin-bottom:1px;">kcal / porção</div>
          <div style="display:flex;align-items:baseline;gap:3px;">
            <input data-action="recipeCal" inputmode="numeric" value="${esc(cur.calories||'')}" placeholder="0" style="border:none;outline:none;background:transparent;font-weight:700;font-size:17px;width:60px;color:#1A1A2E;padding:0;"/>
            <span style="font-size:12px;color:#9A9AB5;font-weight:600;">kcal</span>
          </div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;background:#fff;border:1px solid rgba(26,26,46,.07);border-radius:14px;padding:12px 14px;box-shadow:0 1px 2px rgba(26,26,46,.04);">
        <div style="width:34px;height:34px;border-radius:10px;background:#EDF9F4;display:flex;align-items:center;justify-content:center;color:#2D7A57;flex:none;">${IC.yield}</div>
        <div style="flex:1;">
          <div style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#9A9AB5;font-weight:700;margin-bottom:1px;">Rendimento</div>
          <div style="display:flex;align-items:baseline;gap:3px;">
            <input data-action="recipeServings" inputmode="decimal" value="${esc(cur.servings||'')}" placeholder="0" style="border:none;outline:none;background:transparent;font-weight:700;font-size:17px;width:55px;color:#1A1A2E;padding:0;"/>
            <span style="font-size:12px;color:#9A9AB5;font-weight:600;">porç.</span>
          </div>
        </div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;background:#fff;border:1px solid rgba(26,26,46,.07);border-radius:14px;padding:12px 14px;margin-bottom:24px;box-shadow:0 1px 2px rgba(26,26,46,.04);">
      <div style="width:34px;height:34px;border-radius:10px;background:#FFF8EC;display:flex;align-items:center;justify-content:center;color:#C97B3F;flex:none;">${IC.coin}</div>
      <div style="flex:1;">
        <div style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#9A9AB5;font-weight:700;margin-bottom:1px;">Custo médio</div>
        <div style="display:flex;align-items:baseline;gap:3px;">
          <span style="font-size:15px;color:#9A9AB5;font-weight:600;">R$</span>
          <input data-action="recipeCost" inputmode="decimal" value="${esc(cur.cost||'')}" placeholder="0,00" style="border:none;outline:none;background:transparent;font-weight:700;font-size:17px;width:80px;color:#1A1A2E;padding:0 0 0 4px;"/>
        </div>
      </div>
    </div>
    <div style="font-family:'Playfair Display',serif;font-weight:700;font-size:19px;margin-bottom:12px;">Ingredientes</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px;">${ingsHTML}</div>
    <button data-action="addIng" style="border:1px dashed #D8CEBF;background:#fff;color:${ACCENT_TEXT};font-weight:600;font-size:13px;letter-spacing:.04em;text-transform:uppercase;padding:11px;border-radius:12px;width:100%;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:26px;">${IC.plus}Ingrediente</button>
    <div style="font-family:'Playfair Display',serif;font-weight:700;font-size:19px;margin-bottom:12px;">Modo de preparo</div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:12px;">${stepsHTML}</div>
    <button data-action="addStep" style="border:1px dashed #D8CEBF;background:#fff;color:${ACCENT_TEXT};font-weight:600;font-size:13px;letter-spacing:.04em;text-transform:uppercase;padding:11px;border-radius:12px;width:100%;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:26px;">${IC.plus}Passo</button>
    <div style="font-family:'Playfair Display',serif;font-weight:700;font-size:19px;margin-bottom:12px;">Observações</div>
    <textarea data-action="recipeNotes" rows="4" placeholder="Anotações, substituições, dicas…" style="width:100%;border:1px solid #E2DACE;border-radius:13px;padding:13px 15px;font-size:14.5px;line-height:1.5;background:#fff;outline:none;color:#1A1A2E;">${esc(cur.notes||'')}</textarea>
  </div>`;
}

// ─── MERCADO ─────────────────────────────────────────────────────────────────
function renderMercado(){
  const D=state.data, S=state;
  let shopTotal=0, shopDone=0;
  let catsHTML='';

  CAT_DEFS.forEach(([key,label,color])=>{
    const items=D.shopping[key]||[];
    shopTotal+=items.length; shopDone+=items.filter(i=>i.done).length;
    let itsHTML='';
    items.forEach(it=>{
      itsHTML+=`<div style="display:flex;align-items:center;gap:12px;padding:9px 4px;">
        <button data-action="shopToggle" data-cat="${key}" data-id="${it.id}" style="width:24px;height:24px;border-radius:50%;border:2px solid ${it.done?color:'#D4D4E8'};background:${it.done?color:'#fff'};display:flex;align-items:center;justify-content:center;flex:none;padding:0;">${IC.check}</button>
        <span style="flex:1;font-size:15px;color:${it.done?'#ABABC8':'#1A1A2E'};text-decoration:${it.done?'line-through':'none'};">${esc(it.name)}</span>
        <span style="font-size:13px;color:#ABABC8;">${esc(it.qty||'')}</span>
        <button data-action="shopDel" data-cat="${key}" data-id="${it.id}" style="border:none;background:transparent;color:#D0CCD8;padding:4px;flex:none;">${IC.x}</button>
      </div>`;
    });

    let addFormHTML='';
    if(S.addCat===key){
      addFormHTML=`<div style="display:flex;align-items:center;gap:8px;margin-top:8px;">
        <input data-field="addCatName" value="${esc(S.addCatName)}" placeholder="Adicionar item" style="flex:1;border:1px solid #E2DACE;border-radius:11px;padding:10px 13px;font-size:14.5px;background:#fff;outline:none;color:#1A1A2E;"/>
        <input data-field="addCatQty" value="${esc(S.addCatQty)}" placeholder="Qtd" style="width:64px;border:1px solid #E2DACE;border-radius:11px;padding:10px;font-size:14px;background:#fff;outline:none;color:#5C5C88;text-align:center;"/>
        <button data-action="shopAddSubmit" data-cat="${key}" style="border:none;background:${color};color:#fff;width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex:none;">${IC.plus}</button>
        <button data-action="shopAddCancel" style="border:none;background:transparent;color:#9A9AB5;padding:4px;flex:none;">${IC.x}</button>
      </div>`;
    }

    catsHTML+=`<div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;">
        <span style="display:inline-flex;align-items:center;gap:8px;background:${color};color:#fff;font-weight:700;font-size:12px;letter-spacing:.05em;text-transform:uppercase;padding:6px 14px;border-radius:999px;">${esc(label)}<span style="background:rgba(255,255,255,.28);border-radius:999px;min-width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;padding:0 5px;">${items.length}</span></span>
        <button data-action="shopAddOpen" data-cat="${key}" style="border:none;background:transparent;color:#9A9AB5;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg></button>
      </div>
      <div style="display:flex;flex-direction:column;gap:2px;">${itsHTML}</div>
      ${addFormHTML}
    </div>`;
  });

  return `<div class="page-anim" style="padding:6px 22px 24px;">
    <h1 style="font-family:'Playfair Display',serif;font-weight:800;font-size:32px;margin:10px 0 16px;letter-spacing:-.01em;">Lista de compras</h1>
    <div style="display:flex;background:#fff;border:1px solid rgba(26,26,46,.07);border-radius:16px;padding:14px 0;margin-bottom:20px;box-shadow:0 1px 2px rgba(26,26,46,.05);">
      <div style="flex:1;text-align:center;border-right:1px solid #EEE7DC;"><div style="font-family:'Playfair Display',serif;font-weight:800;font-size:24px;">${shopTotal}</div><div style="font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#9A9AB5;font-weight:700;margin-top:2px;">Total</div></div>
      <div style="flex:1;text-align:center;border-right:1px solid #EEE7DC;"><div style="font-family:'Playfair Display',serif;font-weight:800;font-size:24px;color:#2D6A4F;">${shopDone}</div><div style="font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#9A9AB5;font-weight:700;margin-top:2px;">Comprados</div></div>
      <div style="flex:1;text-align:center;"><div style="font-family:'Playfair Display',serif;font-weight:800;font-size:24px;color:${ACCENT_TEXT};">${shopTotal-shopDone}</div><div style="font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#9A9AB5;font-weight:700;margin-top:2px;">Faltam</div></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:18px;">${catsHTML}</div>
    <button data-action="clearDone" style="margin-top:24px;border:1px solid #E2DACE;background:#fff;color:#5C5C88;font-weight:600;font-size:13px;letter-spacing:.05em;text-transform:uppercase;padding:13px;border-radius:13px;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;">${IC.trash}Remover itens comprados</button>
  </div>`;
}

// ─── LIMPEZA ─────────────────────────────────────────────────────────────────
function renderLimpeza(){
  const D=state.data, S=state;
  const cl=D.cleaning;
  const sec=S.cleanSection||'semana';
  const CLEAN_BLUE='#3E6FB0';
  const CLEAN_BLUE_SOFT='#EEF3FB';

  // Section tabs
  const sections=[['semana','Semana'],['diarias','Diárias'],['periodicas','Periódicas'],['notas','Notas']];
  let secTabsHTML='';
  sections.forEach(([k,l])=>{
    const act=sec===k;
    secTabsHTML+=`<button data-action="cleanSection" data-sec="${k}" style="border:none;flex:1;background:${act?CLEAN_BLUE:'transparent'};color:${act?'#fff':'#9A9AB5'};font-weight:700;font-size:12px;letter-spacing:.04em;text-transform:uppercase;padding:10px 4px;border-radius:12px;">${l}</button>`;
  });

  let bodyHTML='';

  if(sec==='semana'){
    // Weekly grid - one card per day
    let daysHTML='';
    CLEAN_DAYS.forEach(([key,label])=>{
      const tasks=cl.weekTasks[key]||[];
      let tHTML='';
      if(tasks.length===0) tHTML=`<div style="font-size:13px;color:#C4C0CE;padding:4px 0;">Nenhuma tarefa</div>`;
      else tasks.forEach(t=>{
        tHTML+=`<div style="display:flex;align-items:center;gap:9px;padding:4px 0;">
          <button data-action="cleanToggleWeek" data-day="${key}" data-id="${t.id}" style="width:22px;height:22px;border-radius:6px;border:2px solid ${t.done?CLEAN_BLUE:'#D4D4E8'};background:${t.done?CLEAN_BLUE:'#fff'};display:flex;align-items:center;justify-content:center;flex:none;padding:0;">${IC.check}</button>
          <span style="flex:1;font-size:14px;color:${t.done?'#ABABC8':'#1A1A2E'};text-decoration:${t.done?'line-through':'none'};">${esc(t.text)}</span>
          <button data-action="cleanDelWeek" data-day="${key}" data-id="${t.id}" style="border:none;background:transparent;color:#D0CCD8;padding:2px;flex:none;">${IC.x}</button>
        </div>`;
      });
      let addHTML='';
      if(S.cleanAddDay===key){
        addHTML=`<div style="display:flex;gap:7px;margin-top:8px;">
          <input data-field="cleanAddText" value="${esc(S.cleanAddText)}" placeholder="Nova tarefa" style="flex:1;border:1px solid #C8D6EC;border-radius:10px;padding:9px 12px;font-size:14px;background:#fff;outline:none;color:#1A1A2E;"/>
          <button data-action="cleanAddWeekSubmit" data-day="${key}" style="border:none;background:${CLEAN_BLUE};color:#fff;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex:none;">${IC.plus}</button>
          <button data-action="cleanAddCancel" style="border:none;background:transparent;color:#9A9AB5;padding:2px;">${IC.x}</button>
        </div>`;
      }
      daysHTML+=`<div style="background:#fff;border:1px solid rgba(26,26,46,.07);border-radius:16px;padding:14px;box-shadow:0 1px 2px rgba(26,26,46,.04);">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <span style="font-weight:700;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:${CLEAN_BLUE};">${label}</span>
          <button data-action="cleanAddWeekOpen" data-day="${key}" style="border:none;background:${CLEAN_BLUE_SOFT};color:${CLEAN_BLUE};width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex:none;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
          </button>
        </div>
        <div style="display:flex;flex-direction:column;">${tHTML}</div>
        ${addHTML}
      </div>`;
    });
    bodyHTML=`<div style="display:flex;flex-direction:column;gap:10px;">${daysHTML}</div>`;

  } else if(sec==='diarias'){
    const tasks=cl.dailyTasks||[];
    let tHTML='';
    if(tasks.length===0) tHTML=`<div style="text-align:center;font-size:14px;color:#C4C0CE;padding:32px 0;">Nenhuma tarefa diária.</div>`;
    else tasks.forEach(t=>{
      tHTML+=`<div style="display:flex;align-items:center;gap:12px;background:#fff;border:1px solid rgba(26,26,46,.07);border-radius:14px;padding:12px 13px;">
        <button data-action="cleanToggleDaily" data-id="${t.id}" style="width:24px;height:24px;border-radius:7px;border:2px solid ${t.done?CLEAN_BLUE:'#D4D4E8'};background:${t.done?CLEAN_BLUE:'#fff'};display:flex;align-items:center;justify-content:center;flex:none;padding:0;">${IC.check}</button>
        <span style="flex:1;font-size:15px;color:${t.done?'#ABABC8':'#1A1A2E'};text-decoration:${t.done?'line-through':'none'};">${esc(t.text)}</span>
        <button data-action="cleanDelDaily" data-id="${t.id}" style="border:none;background:transparent;color:#D0CCD8;padding:4px;flex:none;">${IC.x}</button>
      </div>`;
    });
    let addDailyHTML='';
    if(S.cleanAddDay==='daily'){
      addDailyHTML=`<div style="display:flex;gap:8px;margin-top:12px;">
        <input data-field="cleanAddText" value="${esc(S.cleanAddText)}" placeholder="Nova tarefa diária" style="flex:1;border:1px solid #C8D6EC;border-radius:11px;padding:11px 13px;font-size:14px;background:#fff;outline:none;color:#1A1A2E;"/>
        <button data-action="cleanAddDailySubmit" style="border:none;background:${CLEAN_BLUE};color:#fff;width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex:none;">${IC.plus}</button>
        <button data-action="cleanAddCancel" style="border:none;background:transparent;color:#9A9AB5;padding:4px;">${IC.x}</button>
      </div>`;
    } else {
      addDailyHTML=`<button data-action="cleanAddDailyOpen" style="border:1px dashed #C8D6EC;background:#fff;color:${CLEAN_BLUE};font-weight:600;font-size:13px;letter-spacing:.04em;text-transform:uppercase;padding:12px;border-radius:13px;width:100%;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:12px;">${IC.plus}Adicionar tarefa</button>`;
    }
    bodyHTML=`<div style="display:flex;flex-direction:column;gap:8px;">${tHTML}</div>${addDailyHTML}`;

  } else if(sec==='periodicas'){
    const tasks=cl.periodicTasks||[];
    let tHTML='';
    if(tasks.length===0) tHTML=`<div style="text-align:center;font-size:14px;color:#C4C0CE;padding:32px 0;">Nenhuma tarefa periódica.</div>`;
    else tasks.forEach(t=>{
      const freqCol=t.freq==='anual'?'#8A6090':'#3E7090';
      const freqLabel=t.freq==='anual'?'Anual':'Semestral';
      tHTML+=`<div style="display:flex;align-items:center;gap:12px;background:#fff;border:1px solid rgba(26,26,46,.07);border-radius:14px;padding:12px 13px;">
        <button data-action="cleanTogglePeriodic" data-id="${t.id}" style="width:24px;height:24px;border-radius:7px;border:2px solid ${t.done?CLEAN_BLUE:'#D4D4E8'};background:${t.done?CLEAN_BLUE:'#fff'};display:flex;align-items:center;justify-content:center;flex:none;padding:0;">${IC.check}</button>
        <div style="flex:1;min-width:0;">
          <div style="font-size:15px;color:${t.done?'#ABABC8':'#1A1A2E'};text-decoration:${t.done?'line-through':'none'};">${esc(t.text)}</div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:4px;">
            <span style="font-size:11px;font-weight:700;background:${freqCol}22;color:${freqCol};padding:2px 9px;border-radius:999px;">${freqLabel}</span>
            ${t.lastDone?`<span style="font-size:11px;color:#9A9AB5;">${IC.clock} Feito: ${t.lastDone}</span>`:''}
          </div>
        </div>
        <button data-action="cleanDelPeriodic" data-id="${t.id}" style="border:none;background:transparent;color:#D0CCD8;padding:4px;flex:none;">${IC.x}</button>
      </div>`;
    });
    let addPeriodicHTML='';
    if(S.addingPeriodic){
      addPeriodicHTML=`<div style="background:#fff;border:1px solid rgba(26,26,46,.07);border-radius:16px;padding:14px;margin-top:12px;">
        <input data-field="periodicText" value="${esc(S.periodicText)}" placeholder="Descrição da tarefa" style="width:100%;border:1px solid #E2DACE;border-radius:11px;padding:11px 13px;font-size:14px;background:#F9F7F4;outline:none;color:#1A1A2E;margin-bottom:10px;"/>
        <div style="display:flex;gap:8px;margin-bottom:12px;">
          <button data-action="periodicFreqSelect" data-freq="semestral" style="flex:1;border:none;background:${S.periodicFreq==='semestral'?'#3E7090':'#F1EBE2'};color:${S.periodicFreq==='semestral'?'#fff':'#5C5C88'};font-weight:700;font-size:13px;padding:10px;border-radius:11px;">Semestral</button>
          <button data-action="periodicFreqSelect" data-freq="anual" style="flex:1;border:none;background:${S.periodicFreq==='anual'?'#8A6090':'#F1EBE2'};color:${S.periodicFreq==='anual'?'#fff':'#5C5C88'};font-weight:700;font-size:13px;padding:10px;border-radius:11px;">Anual</button>
        </div>
        <div style="display:flex;gap:8px;">
          <button data-action="cleanAddPeriodicSubmit" style="flex:1;border:none;background:${CLEAN_BLUE};color:#fff;font-weight:700;font-size:13px;padding:12px;border-radius:11px;">Adicionar</button>
          <button data-action="cancelAddPeriodic" style="border:none;background:transparent;color:#9A9AB5;padding:8px;">${IC.x}</button>
        </div>
      </div>`;
    } else {
      addPeriodicHTML=`<button data-action="openAddPeriodic" style="border:1px dashed #C8D6EC;background:#fff;color:${CLEAN_BLUE};font-weight:600;font-size:13px;letter-spacing:.04em;text-transform:uppercase;padding:12px;border-radius:13px;width:100%;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:12px;">${IC.plus}Nova tarefa periódica</button>`;
    }
    bodyHTML=`<div style="display:flex;flex-direction:column;gap:8px;">${tHTML}</div>${addPeriodicHTML}`;

  } else if(sec==='notas'){
    bodyHTML=`<div style="background:#fff;border:1px solid rgba(26,26,46,.07);border-radius:18px;padding:16px;box-shadow:0 1px 2px rgba(26,26,46,.04);">
      <div style="font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#9A9AB5;font-weight:700;margin-bottom:10px;">Anotações livres</div>
      <textarea data-action="cleanNotes" rows="12" placeholder="Dicas, rotinas, observações…" style="width:100%;border:none;outline:none;background:transparent;font-size:14.5px;line-height:1.6;color:#1A1A2E;resize:none;">${esc(cl.notes||'')}</textarea>
    </div>`;
  }

  return `<div class="page-anim" style="padding:6px 22px 24px;">
    <h1 style="font-family:'Playfair Display',serif;font-weight:800;font-size:32px;margin:10px 0 18px;letter-spacing:-.01em;">Limpeza</h1>
    <div style="display:flex;background:${CLEAN_BLUE_SOFT};border-radius:14px;padding:4px;gap:2px;margin-bottom:18px;">${secTabsHTML}</div>
    ${bodyHTML}
  </div>`;
}

// ─── MODAL refeição ───────────────────────────────────────────────────────────
function renderMealModal(){
  if(!state.mealModal) return '';
  const S=state, D=state.data;
  const md=parseISO(S.mealDate||S.selDate);
  const mealDateLabel=DOW[md.getDay()]+', '+md.getDate()+' '+MON_S[md.getMonth()];
  let typesHTML='';
  ['cafe','almoco','jantar','lanche'].forEach(k=>{
    const ti=TYPE_INFO[k]; const act=S.mealType===k;
    typesHTML+=`<button data-action="mealTypeSelect" data-type="${k}" style="border:none;background:${act?ACCENT:ti.bg};color:${act?ACCENT_INK:ti.color};font-weight:700;font-size:12.5px;letter-spacing:.04em;text-transform:uppercase;padding:10px 15px;border-radius:999px;">${ti.label}</button>`;
  });
  const recs=D.recipes.filter(r=>(r.name||'').trim());
  let recsHTML='';
  if(recs.length){
    recsHTML=`<div style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#9A9AB5;font-weight:700;margin-bottom:9px;">Ou escolha uma receita</div><div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;">`;
    recs.forEach(r=>{
      const act=S.mealRecipeId===r.id;
      recsHTML+=`<button data-action="mealRecipeSelect" data-id="${r.id}" data-name="${esc(r.name)}" style="border:none;background:${act?ACCENT:'#F1EEE8'};color:${act?ACCENT_INK:'#404068'};font-weight:600;font-size:13.5px;padding:9px 14px;border-radius:999px;">${esc(r.name)}</button>`;
    });
    recsHTML+='</div>';
  }
  return `<div style="position:absolute;inset:0;z-index:40;display:flex;align-items:flex-end;background:rgba(26,26,46,.4);" data-action="closeMealModal">
    <div class="modal-anim" style="width:100%;background:#FFFBF4;border-radius:24px 24px 0 0;padding:22px 22px 28px;max-height:90%;overflow-y:auto;" onclick="event.stopPropagation()">
      <div style="width:40px;height:4px;border-radius:999px;background:#E2DACE;margin:0 auto 18px;"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
        <h2 style="font-family:'Playfair Display',serif;font-weight:800;font-size:24px;">Nova refeição</h2>
        <button data-action="closeMealModal" style="border:none;background:#F1EBE2;color:#5C5C88;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;">${IC.x}</button>
      </div>
      <div style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#9A9AB5;font-weight:700;margin-bottom:18px;">${mealDateLabel}</div>
      <div style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#9A9AB5;font-weight:700;margin-bottom:9px;">Refeição</div>
      <input data-field="mealName" value="${esc(S.mealName)}" placeholder="Nome do prato" style="width:100%;border:1px solid #E2DACE;border-radius:13px;padding:13px 15px;font-size:15px;background:#fff;outline:none;color:#1A1A2E;margin-bottom:18px;"/>
      ${recsHTML}
      <div style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#9A9AB5;font-weight:700;margin-bottom:9px;">Tipo</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;">${typesHTML}</div>
      <button data-action="saveMeal" style="width:100%;border:none;background:${ACCENT_GRAD};color:#fff;font-weight:700;font-size:14px;letter-spacing:.07em;text-transform:uppercase;padding:16px;border-radius:16px;box-shadow:0 10px 22px -6px rgba(244,123,91,.5);">Adicionar ao dia</button>
    </div>
  </div>`;
}

// ─── Nav ──────────────────────────────────────────────────────────────────────
function renderNav(){
  const v=state.view;
  const isRec=v==='receitas'||v==='receita';
  const col=tab=>((v===tab)||(tab==='receitas'&&isRec))?ACCENT_TEXT:'#9A9AB5';
  const tabs=[
    {key:'hoje',icon:IC.utensils,label:'Hoje'},
    {key:'semana',icon:IC.calendar,label:'Semana'},
    {key:'agua',icon:IC.droplet,label:'Água'},
    {key:'receitas',icon:IC.book,label:'Receitas'},
    {key:'mercado',icon:IC.cart,label:'Mercado'},
    {key:'limpeza',icon:IC.broom,label:'Limpeza'},
  ];
  return `<nav style="position:absolute;left:0;right:0;bottom:0;height:72px;background:#fff;border-top:1px solid rgba(26,26,46,.08);box-shadow:0 -4px 16px rgba(26,26,46,.05);display:grid;grid-template-columns:repeat(6,1fr);align-items:center;z-index:20;padding-bottom:env(safe-area-inset-bottom);">${tabs.map(t=>`<button data-action="nav" data-view="${t.key}" style="border:none;background:transparent;display:flex;flex-direction:column;align-items:center;gap:3px;color:${col(t.key)};padding:0;">${t.icon}<span style="font-size:9px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;">${t.label}</span></button>`).join('')}</nav>`;
}

// ─── Render principal ─────────────────────────────────────────────────────────
function render(){
  const v=state.view;
  let page='';
  if(v==='hoje') page=renderHoje();
  else if(v==='semana') page=renderSemana();
  else if(v==='agua') page=renderAgua();
  else if(v==='receitas') page=renderReceitas();
  else if(v==='receita') page=renderReceita();
  else if(v==='mercado') page=renderMercado();
  else if(v==='limpeza') page=renderLimpeza();

  document.getElementById('root').innerHTML=`
  <div style="width:100%;max-width:480px;min-height:100vh;background:linear-gradient(180deg,#FFF6F1 0%,#FFFDFB 38%);position:relative;box-shadow:0 0 50px rgba(26,26,46,.10);display:flex;flex-direction:column;overflow:hidden;">
    <div style="position:absolute;top:-70px;right:-60px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(244,123,91,.30),rgba(244,123,91,0) 70%);pointer-events:none;z-index:0;"></div>
    <div style="position:absolute;top:170px;left:-80px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle at 50% 50%,rgba(226,114,154,.20),rgba(226,114,154,0) 70%);pointer-events:none;z-index:0;"></div>
    <div style="position:absolute;top:430px;right:-70px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 50% 50%,rgba(246,193,46,.18),rgba(246,193,46,0) 70%);pointer-events:none;z-index:0;"></div>
    <div style="position:relative;z-index:1;flex:1;overflow-y:auto;padding-bottom:96px;">
      <div style="display:flex;align-items:center;gap:10px;padding:16px 22px 8px;">
        <div style="width:32px;height:32px;border-radius:10px;background:${ACCENT_GRAD};display:flex;align-items:center;justify-content:center;flex:none;box-shadow:0 4px 12px rgba(244,123,91,.28);">${IC.home}</div>
        <div style="line-height:1.05;">
          <div style="font-family:'Playfair Display',serif;font-weight:700;font-size:15px;">Casa da Mãe</div>
          <div style="font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#9A9AB5;margin-top:3px;font-weight:600;">Planejamento Alimentar</div>
        </div>
      </div>
      ${page}
    </div>
    ${renderNav()}
    ${renderMealModal()}
  </div>`;
}

// ─── Event handlers ───────────────────────────────────────────────────────────
document.getElementById('root').addEventListener('click', e=>{
  const btn=e.target.closest('[data-action]');
  if(!btn) return;
  const a=btn.dataset.action;
  const S=state, D=S.data;

  if(a==='nav'){
    const v=btn.dataset.view;
    setState(v==='receitas'?{view:'receitas',editId:null,search:'',recipeCatFilter:'all'}:{view:v});
  } else if(a==='selDate') setState({selDate:btn.dataset.date});
  else if(a==='prevWeek') setState({selDate:iso(addDays(parseISO(S.selDate),-7))});
  else if(a==='nextWeek') setState({selDate:iso(addDays(parseISO(S.selDate),7))});
  // blocos
  else if(a==='addBlockOpen') setState({addBlock:btn.dataset.type,addBlockName:'',addBlockRecipeId:'',addBlockCal:''});
  else if(a==='addBlockCancel') setState({addBlock:null,addBlockName:'',addBlockRecipeId:'',addBlockCal:''});
  else if(a==='addBlockSubmit'){
    const name=(S.addBlockName||'').trim(); if(!name) return;
    const cal=parseInt(S.addBlockCal,10);
    const date=btn.dataset.date, type=btn.dataset.type;
    updateData(d=>{if(!d.meals[date])d.meals[date]=[];d.meals[date].push({id:uid(),name,type,recipeId:S.addBlockRecipeId||null,cal:cal>0?cal:0});});
    setState({addBlock:null,addBlockName:'',addBlockRecipeId:'',addBlockCal:''});
  } else if(a==='blockRecipe'){
    const cal=parseInt(btn.dataset.rcal,10)||0;
    setState({addBlockRecipeId:btn.dataset.rid,addBlockName:btn.dataset.rname,addBlockCal:cal>0?String(cal):''});
  } else if(a==='mealUp') moveMealInType(btn.dataset.date,btn.dataset.id,btn.dataset.type,-1);
  else if(a==='mealDown') moveMealInType(btn.dataset.date,btn.dataset.id,btn.dataset.type,1);
  else if(a==='mealDel'){
    const date=btn.dataset.date, id=btn.dataset.id;
    updateData(d=>{d.meals[date]=(d.meals[date]||[]).filter(x=>x.id!==id);});
  }
  // modal semana
  else if(a==='openMealModal') setState({mealModal:true,mealDate:btn.dataset.date,mealName:'',mealType:'cafe',mealRecipeId:''});
  else if(a==='closeMealModal') setState({mealModal:false});
  else if(a==='mealTypeSelect') setState({mealType:btn.dataset.type});
  else if(a==='mealRecipeSelect') setState({mealRecipeId:btn.dataset.id,mealName:btn.dataset.name});
  else if(a==='saveMeal'){
    const name=(S.mealName||'').trim(); if(!name) return;
    const date=S.mealDate||S.selDate;
    updateData(d=>{if(!d.meals[date])d.meals[date]=[];d.meals[date].push({id:uid(),name,type:S.mealType,recipeId:S.mealRecipeId||null,cal:0});});
    setState({mealModal:false});
  }
  // água
  else if(a==='quickWater') addWater(parseInt(btn.dataset.ml,10));
  else if(a==='waterAdd'){const v=parseInt(S.waterAmt,10);if(v>0){addWater(v);setState({waterAmt:''});}}
  else if(a==='goalDec') updateData(d=>{d.goal=Math.max(250,(d.goal||2000)-250);});
  else if(a==='goalInc') updateData(d=>{d.goal=(d.goal||2000)+250;});
  else if(a==='waterDel'){const id=btn.dataset.id,t=iso(new Date());updateData(d=>{d.water[t]=(d.water[t]||[]).filter(x=>x.id!==id);});}
  else if(a==='waterReset'){const t=iso(new Date());updateData(d=>{d.water[t]=[];});}
  // receitas
  else if(a==='newRecipe'){
    const id=uid();
    updateData(d=>{d.recipes.push({id,name:'',calories:'',ingredients:[{id:uid(),name:'',qty:''}],steps:[{id:uid(),text:''}],notes:''});});
    setState({view:'receita',editId:id});
  } else if(a==='openRecipe') setState({view:'receita',editId:btn.dataset.id});
  else if(a==='deleteRecipe'){const id=btn.dataset.id;updateData(d=>{d.recipes=d.recipes.filter(x=>x.id!==id);});}
  else if(a==='backRecipes') setState({view:'receitas',editId:null});
  else if(a==='deleteCurrentRecipe'){const id=S.editId;updateData(d=>{d.recipes=d.recipes.filter(x=>x.id!==id);});setState({view:'receitas',editId:null});}
  else if(a==='addIng'){const id=S.editId;updateData(d=>{const r=d.recipes.find(x=>x.id===id);if(r)r.ingredients.push({id:uid(),name:'',qty:''});});}
  else if(a==='ingDel'){const rid=S.editId,iid=btn.dataset.id;updateData(d=>{const r=d.recipes.find(x=>x.id===rid);if(r)r.ingredients=r.ingredients.filter(i=>i.id!==iid);});}
  else if(a==='addStep'){const id=S.editId;updateData(d=>{const r=d.recipes.find(x=>x.id===id);if(r)r.steps.push({id:uid(),text:''});});}
  else if(a==='stepDel'){const rid=S.editId,sid=btn.dataset.id;updateData(d=>{const r=d.recipes.find(x=>x.id===rid);if(r)r.steps=r.steps.filter(s=>s.id!==sid);});}
  // mercado
  else if(a==='shopAddOpen') setState({addCat:btn.dataset.cat,addCatName:'',addCatQty:''});
  else if(a==='shopAddCancel') setState({addCat:null});
  else if(a==='shopAddSubmit'){
    const key=btn.dataset.cat,name=(S.addCatName||'').trim();if(!name)return;
    updateData(d=>{if(!d.shopping[key])d.shopping[key]=[];d.shopping[key].push({id:uid(),name,qty:(S.addCatQty||'').trim(),done:false});});
    setState({addCatName:'',addCatQty:''});
  } else if(a==='shopToggle'){const key=btn.dataset.cat,id=btn.dataset.id;updateData(d=>{const x=d.shopping[key].find(i=>i.id===id);if(x)x.done=!x.done;});}
  else if(a==='shopDel'){const key=btn.dataset.cat,id=btn.dataset.id;updateData(d=>{d.shopping[key]=d.shopping[key].filter(i=>i.id!==id);});}
  else if(a==='clearDone') updateData(d=>{Object.keys(d.shopping).forEach(k=>{d.shopping[k]=d.shopping[k].filter(i=>!i.done);});});
  // receitas — categoria, grupo novo
  else if(a==='recipeCatFilter') setState({recipeCatFilter:btn.dataset.cat});
  else if(a==='openNewCat') setState({addingNewCat:true,newCatName:''});
  else if(a==='cancelNewCat') setState({addingNewCat:false,newCatName:''});
  else if(a==='saveNewCat'){
    const n=(S.newCatName||'').trim(); if(!n) return;
    const id='c'+uid();
    updateData(d=>{if(!d.recipeCategories)d.recipeCategories=[];d.recipeCategories.push({id,name:n});});
    setState({addingNewCat:false,newCatName:'',recipeCatFilter:id});
  }
  else if(a==='recipeSetCat'){
    const rid=S.editId, cat=btn.dataset.cat||'';
    updateData(d=>{const r=d.recipes.find(x=>x.id===rid);if(r)r.category=cat;});
  }
  // limpeza — seção
  else if(a==='cleanSection') setState({cleanSection:btn.dataset.sec,cleanAddDay:null,cleanAddText:'',addingPeriodic:false});
  // limpeza — semana
  else if(a==='cleanAddWeekOpen') setState({cleanAddDay:btn.dataset.day,cleanAddText:''});
  else if(a==='cleanAddCancel') setState({cleanAddDay:null,cleanAddText:''});
  else if(a==='cleanAddWeekSubmit'){
    const day=btn.dataset.day, text=(S.cleanAddText||'').trim(); if(!text) return;
    updateData(d=>{if(!d.cleaning.weekTasks[day])d.cleaning.weekTasks[day]=[];d.cleaning.weekTasks[day].push({id:uid(),text,done:false});});
    setState({cleanAddDay:null,cleanAddText:''});
  }
  else if(a==='cleanToggleWeek'){const day=btn.dataset.day,id=btn.dataset.id;updateData(d=>{const t=d.cleaning.weekTasks[day].find(x=>x.id===id);if(t)t.done=!t.done;});}
  else if(a==='cleanDelWeek'){const day=btn.dataset.day,id=btn.dataset.id;updateData(d=>{d.cleaning.weekTasks[day]=d.cleaning.weekTasks[day].filter(x=>x.id!==id);});}
  // limpeza — diárias
  else if(a==='cleanAddDailyOpen') setState({cleanAddDay:'daily',cleanAddText:''});
  else if(a==='cleanAddDailySubmit'){
    const text=(S.cleanAddText||'').trim(); if(!text) return;
    updateData(d=>{d.cleaning.dailyTasks.push({id:uid(),text,done:false});});
    setState({cleanAddDay:null,cleanAddText:''});
  }
  else if(a==='cleanToggleDaily'){const id=btn.dataset.id;updateData(d=>{const t=d.cleaning.dailyTasks.find(x=>x.id===id);if(t)t.done=!t.done;});}
  else if(a==='cleanDelDaily'){const id=btn.dataset.id;updateData(d=>{d.cleaning.dailyTasks=d.cleaning.dailyTasks.filter(x=>x.id!==id);});}
  // limpeza — periódicas
  else if(a==='openAddPeriodic') setState({addingPeriodic:true,periodicText:'',periodicFreq:'semestral'});
  else if(a==='cancelAddPeriodic') setState({addingPeriodic:false,periodicText:''});
  else if(a==='periodicFreqSelect') setState({periodicFreq:btn.dataset.freq});
  else if(a==='cleanAddPeriodicSubmit'){
    const text=(S.periodicText||'').trim(); if(!text) return;
    updateData(d=>{d.cleaning.periodicTasks.push({id:uid(),text,freq:S.periodicFreq||'semestral',lastDone:null,done:false});});
    setState({addingPeriodic:false,periodicText:''});
  }
  else if(a==='cleanTogglePeriodic'){
    const id=btn.dataset.id;
    updateData(d=>{const t=d.cleaning.periodicTasks.find(x=>x.id===id);if(t){t.done=!t.done;if(t.done){const now=new Date();t.lastDone=now.getDate()+'/'+(now.getMonth()+1)+'/'+now.getFullYear();}}});
  }
  else if(a==='cleanDelPeriodic'){const id=btn.dataset.id;updateData(d=>{d.cleaning.periodicTasks=d.cleaning.periodicTasks.filter(x=>x.id!==id);});}
});

document.getElementById('root').addEventListener('input', e=>{
  const el=e.target;
  const field=el.dataset.field;
  const action=el.dataset.action;
  if(field){
    // Atualiza estado sem re-renderizar (evita perda de foco no mobile)
    state[field]=el.value;
    if(field==='search'){
      // Busca precisa filtrar: re-renderiza e recoloca foco
      const pos=el.selectionStart;
      render();
      const neo=document.querySelector('[data-field="search"]');
      if(neo){neo.focus();try{neo.setSelectionRange(pos,pos);}catch(_){}}
    }
    return;
  }
  if(!action) return;
  const rid=state.editId;
  // Receitas: salva no localStorage sem re-renderizar (mantém foco)
  const silentSave=fn=>{
    const d=JSON.parse(JSON.stringify(state.data));
    fn(d);saveData(d);state.data=d;
  };
  if(action==='recipeName') silentSave(d=>{const r=d.recipes.find(x=>x.id===rid);if(r)r.name=el.value;});
  else if(action==='recipeCal') silentSave(d=>{const r=d.recipes.find(x=>x.id===rid);if(r)r.calories=el.value;});
  else if(action==='recipeNotes') silentSave(d=>{const r=d.recipes.find(x=>x.id===rid);if(r)r.notes=el.value;});
  else if(action==='recipeServings') silentSave(d=>{const r=d.recipes.find(x=>x.id===rid);if(r)r.servings=el.value;});
  else if(action==='recipeCost') silentSave(d=>{const r=d.recipes.find(x=>x.id===rid);if(r)r.cost=el.value;});
  else if(action==='ingName'){const iid=el.dataset.id;silentSave(d=>{const r=d.recipes.find(x=>x.id===rid);if(r){const x=r.ingredients.find(i=>i.id===iid);if(x)x.name=el.value;}});}
  else if(action==='ingQty'){const iid=el.dataset.id;silentSave(d=>{const r=d.recipes.find(x=>x.id===rid);if(r){const x=r.ingredients.find(i=>i.id===iid);if(x)x.qty=el.value;}});}
  else if(action==='stepText'){const sid=el.dataset.id;silentSave(d=>{const r=d.recipes.find(x=>x.id===rid);if(r){const x=r.steps.find(s=>s.id===sid);if(x)x.text=el.value;}});}
  else if(action==='cleanNotes') silentSave(d=>{d.cleaning.notes=el.value;});
});

function moveMealInType(date,id,type,dir){
  updateData(d=>{
    const arr=d.meals[date]||[];
    const idxs=arr.map((x,k)=>x.type===type?k:-1).filter(k=>k>=0);
    const pos=idxs.findIndex(k=>arr[k].id===id);
    const np=pos+dir;
    if(pos<0||np<0||np>=idxs.length) return;
    const a=idxs[pos],b=idxs[np],t=arr[a];arr[a]=arr[b];arr[b]=t;
  });
}

function addWater(ml){
  if(!(ml>0)) return;
  const t=new Date(),z=n=>String(n).padStart(2,'0');
  const time=z(t.getHours())+':'+z(t.getMinutes());
  const today=iso(new Date());
  updateData(d=>{if(!d.water[today])d.water[today]=[];d.water[today].push({id:uid(),ml,time});});
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

render();
</script>
